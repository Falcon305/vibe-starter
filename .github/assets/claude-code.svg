<svg width="1000" height="560" viewBox="0 0 1000 560" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <rect x="0.5" y="0.5" width="999" height="559" rx="14" fill="#0C0C11" stroke="#26262F"/>
